<!DOCTYPE html>
<html>
<head>
    <title>Book Appointment - Udaan Care</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2 style="text-align:center;">Book Your Appointment</h2>

<form class="booking-form">
    <input type="text" placeholder="Full Name" required>
    <input type="email" placeholder="Email" required>
    <input type="tel" placeholder="Phone Number" required>
    <input type="date" required>
    <select required>
        <option>Select Service</option>
        <option>Pediatric Therapy</option>
        <option>Neuro Therapy</option>
        <option>Sensory Integration</option>
    </select>
    <button type="submit">Proceed to Payment</button>
</form>

</body>
</html>
<button id="payBtn">Pay ₹500 & Confirm</button>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="script.js"></script>
